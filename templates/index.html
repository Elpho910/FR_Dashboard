<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ airport }} Flight Information</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/board.css') }}" />
</head>
<body>
  <div class="board-shell">
    <header class="board-header">
      <div class="board-brand" aria-label="Burnie Airport">
        <div class="board-brand-glow"></div>
        <div class="board-brand-frame">
          <img
            class="board-brand-logo"
            src="{{ url_for('static', filename='logos/Burnie_Airport_soft.png') }}"
            alt="Burnie Airport"
          />
        </div>
      </div>
      <div class="clock-panel">
        <div class="clock" id="clock">--:--</div>
        <div class="dateline" id="dateline">---</div>
      </div>
    </header>

    <main class="boards">
      <section class="board-panel">
        <div class="board-panel-header">
          <div class="board-panel-title">Arrivals</div>
          <div class="board-panel-count" id="arrivals-count"></div>
        </div>
        <div class="table-scroll">
          <div class="fids-head">
            <span>Airline</span>
            <span>Flight</span>
            <span>Origin</span>
            <span style="text-align:center;">Sch.</span>
            <span style="text-align:center;">Est.</span>
            <span>Status</span>
          </div>
          <div id="arrivals-body">
            <div class="fids-empty">Loading...</div>
          </div>
        </div>
      </section>

      <section class="board-panel">
        <div class="board-panel-header">
          <div class="board-panel-title">Departures</div>
          <div class="board-panel-count" id="departures-count"></div>
        </div>
        <div class="table-scroll">
          <div class="fids-head">
            <span>Airline</span>
            <span>Flight</span>
            <span>Destination</span>
            <span style="text-align:center;">Sch.</span>
            <span style="text-align:center;">Est.</span>
            <span>Status</span>
          </div>
          <div id="departures-body">
            <div class="fids-empty">Loading...</div>
          </div>
        </div>
      </section>
    </main>

    <div class="board-footer">
      <span id="provider-label">{{ provider_label }}</span>
      <span>&middot;</span>
      <span>Airport local time</span>
      <span>&middot;</span>
      <span>{{ airport_timezone }}</span>
      <span id="sync-indicator" class="sync-indicator" hidden aria-hidden="true"></span>
    </div>
  </div>

  <script id="board-config" type="application/json">{{ {
    'airport': airport,
    'airport_timezone': airport_timezone,
    'refresh_interval': refresh_interval,
    'refresh_window_start': refresh_window_start,
    'refresh_window_end': refresh_window_end,
    'browser_hard_refresh_seconds': browser_hard_refresh_seconds,
    'api_flights_url': url_for('api_flights'),
    'app_role': app_role,
    'provider_label': provider_label,
    'airport_name_map': {
      'ADL': 'Adelaide',
      'AVV': 'Melbourne Avalon',
      'BWT': 'Burnie',
      'CNS': 'Cairns',
      'HBA': 'Hobart',
      'KNS': 'King Island',
      'LST': 'Launceston',
      'MEL': 'Melbourne',
      'MGB': 'Mount Gambier',
      'MQL': 'Mildura',
      'OOL': 'Gold Coast',
      'PER': 'Perth',
      'SYD': 'Sydney',
      'WYY': 'Burnie',
      'YWYY': 'Burnie',
    },
    'airline_logos': {
      'airline-qantas': url_for('static', filename='logos/QLK.png'),
      'airline-rex': url_for('static', filename='logos/RXA.png'),
      'airline-sharp': url_for('static', filename='logos/SHA.png'),
    },
  } | tojson }}</script>
  <script src="{{ url_for('static', filename='js/board.js') }}" defer></script>
</body>
</html>
